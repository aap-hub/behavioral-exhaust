- task_id: pytest-dev__pytest-8365
  phase: 0
  type: bugfix
  language: python
  repo: tasks/repos/pytest-dev__pytest-8365
  prompt: "Fix the following issue in this repository. First, set up the environment: run `pip install -e .` or `pip install\
    \ -e \".[testing]\"` to install dependencies. Then find and fix the bug. Run the relevant tests to verify your fix.\n\n\
    Fix the following issue:\n\ntmpdir creation fails when the username contains illegal characters for directory names\n\
    `tmpdir`, `tmpdir_factory` and `tmp_path_factory` rely on `getpass.getuser()` for determining the `basetemp` directory.\
    \ I found that the user name returned by `getpass.getuser()` may return characters that are not allowed for directory\
    \ names. This may lead to errors while creating the temporary directory.\n\nThe situation in which I reproduced this issue\
    \ was while being logged in through an ssh connection into my Windows 10 x64 Enterprise version (1909) using an OpenSSH_for_Windows_7.7p1\
    \ server. In this configuration the command `python -c \"import getpass; print(getpass.getuser())\"` returns my domain\
    \ username e.g. `contoso\\john_doe` instead of `john_doe` as when logged in regularly using a local session.\n\nWhen trying\
    \ to create a temp directory in pytest through e.g. `tmpdir_factory.mktemp('foobar')` this fails with the following error\
    \ message:\n```\nself = WindowsPath('C:/Users/john_doe/AppData/Local/Temp/pytest-of-contoso/john_doe')\nmode = 511, parents\
    \ = False, exist_ok = True\n\n    def mkdir(self, mode=0o777, parents=False, exist_ok=False):\n        \"\"\"\n      \
    \  Create a new directory at this given path.\n        \"\"\"\n        if self._closed:\n            self._raise_closed()\n\
    \        try:\n>           self._accessor.mkdir(self, mode)\nE           FileNotFoundError: [WinError 3] The system cannot\
    \ find the path specified: 'C:\\\\Users\\\\john_doe\\\\AppData\\\\Local\\\\Temp\\\\pytest-of-contoso\\\\john_doe'\n\n\
    C:\\Python38\\lib\\pathlib.py:1266: FileNotFoundError\n```\n\nI could also reproduce this without the complicated ssh/windows\
    \ setup with pytest 6.2.2 using the following commands from a `cmd`:\n```bat\necho def test_tmpdir(tmpdir):>test_tmp.py\n\
    echo   pass>>test_tmp.py\nset LOGNAME=contoso\\john_doe\npy.test test_tmp.py\n```\n\nThanks for having a look at this!\n"
  validation_command: python -m pytest testing/test_tmpdir.py::test_tmp_path_factory_handles_invalid_dir_characters -x
  expected_min_calls: 5
  source: swe-bench-lite
